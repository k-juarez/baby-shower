<script>
        // Simple confetti effect for celebration
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('confetti-container');
            const colors = ['#ffb300', '#ffdeac', '#cdc897', '#e7e1ae'];
            
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti', 'rounded-full');
                
                // Randomize properties
                const size = Math.random() * 8 + 4;
                const left = Math.random() * 100;
                const top = Math.random() * 100;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const delay = Math.random() * 2;
                const duration = Math.random() * 2 + 2;

                confetti.style.width = `${size}px`;
                confetti.style.height = `${size}px`;
                confetti.style.left = `${left}%`;
                confetti.style.top = `${top}%`;
                confetti.style.backgroundColor = color;
                
                // Animate
                confetti.animate([
                    { transform: 'translateY(-20px) scale(0)', opacity: 0 },
                    { transform: 'translateY(20px) scale(1)', opacity: 0.8, offset: 0.2 },
                    { transform: `translateY(${Math.random() * 100 + 50}px) scale(0)`, opacity: 0 }
                ], {
                    duration: duration * 1000,
                    delay: delay * 1000,
                    iterations: Infinity,
                    easing: 'ease-in-out'
                });

                container.appendChild(confetti);
            }
        });
    </script>
